# Local Eureka profile values for tenant-aware authzmanager development.
# Loads local database, server port, Eureka registry, and service-id endpoints.
SERVER_PORT: 9093

POSTGRES_USERNAME: test
POSTGRES_PASSWORD: test
POSTGRES_DBNAME: authzmanager
POSTGRES_SERVICE: localhost:5432
DB_SSLMODE: disable

EUREKA_HOST: localhost:8761
EUREKA_USER: test
EUREKA_PASSWORD: test

eureka:
  client:
    enabled: true
    serviceUrl:
      defaultZone: http://${EUREKA_USER}:${EUREKA_PASSWORD}@${EUREKA_HOST}/eureka

spring:
  cloud:
    kubernetes:
      enabled: false

USER_REST_SERVICE: http://user-rest-service
AUTHENTICATION_REST_SERVICE: http://authentication-rest-service
AUTH_SERVER: http://authorization-server
ORGANIZATION_REST_SERVICE: http://organization-rest-service
ROLE_REST_SERVICE: http://role-rest-service
ACCOUNT_REST_SERVICE: http://account-rest-service

allowedOrigins: http://api-gateway, 10.0.0.28, localhost, 127.0.0.1, api-gateway, 10.0.0.28:8080, 127.0.0.1, platform.admin.openissuer.test, business1.admin.openissuer.test, business2.admin.openissuer.test, free.admin.openissuer.test

ISSUER_ADDRESS: http://platform.openissuer.test:9001

ISSUER_URI: ${ISSUER_ADDRESS}
OAUTH_AUDIENCES: oauth-client
JWT_SET_URI: ${ISSUER_ADDRESS}/oauth2/jwks

REQUEST_SCOPES: message.read message.write
BASE64_CLIENT_ID_SECRET: b2F1dGgtY2xpZW50Om9hdXRoLXNlY3JldA==

AUTHZMANAGER_INITIAL_SECRET: hello

authzmanager:
  user-search:
    hosts:
      "[free.openissuer.test]":
        allowed-email-domains:
          - "*"
      "[business1.openissuer.test]":
        allowed-email-domains:
          - business1.com
      "[business2.openissuer.test]":
        allowed-email-domains:
          - business2.com
