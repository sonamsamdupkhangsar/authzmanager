<!-- OAuth login failure page for the tenant-aware authzmanager UI. -->
<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">

    <!-- Bootstrap CSS -->
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/css/bootstrap.min.css"
          integrity="sha384-Gn5384xqQ1aoWXA+058RXPxPg6fy4IWvTNh0E263XmFcJlSAwiGgFAW/dAiS6JXm" crossorigin="anonymous">

    <title>OpenIssuer Admin - Login error</title>
    <style>
        body {
            background: #f7f9f6;
            color: #111817;
        }

        .status-shell {
            min-height: 100vh;
            display: flex;
            flex-direction: column;
        }

        .status-nav {
            min-height: 72px;
            display: flex;
            align-items: center;
            justify-content: space-between;
            gap: 1rem;
        }

        .brand {
            color: #111817;
            font-size: 1.2rem;
            font-weight: 800;
        }

        .actions {
            display: flex;
            flex-wrap: wrap;
            gap: .75rem;
        }

        .primary-action,
        .secondary-action {
            min-height: 42px;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: .35rem;
            padding: 0 1rem;
            font-weight: 700;
        }

        .primary-action {
            background: #13211d;
            color: #fff;
        }

        .primary-action:hover {
            color: #fff;
            text-decoration: none;
        }

        .secondary-action {
            border: 1px solid #b8c2bd;
            color: #1b2723;
        }

        .secondary-action:hover {
            color: #1b2723;
            text-decoration: none;
        }

        .status-card {
            width: min(100%, 760px);
            margin: auto;
            padding: 2rem;
            border: 1px solid #d8ded8;
            border-radius: .5rem;
            background: #fffef9;
            box-shadow: 0 22px 70px rgba(35, 48, 44, .13);
        }

        .eyebrow {
            color: #9d2b2b;
            font-size: .78rem;
            font-weight: 800;
            letter-spacing: .12em;
            text-transform: uppercase;
        }

        .status-card h1 {
            margin: 1rem 0;
            color: #111817;
            font-size: clamp(2.2rem, 5vw, 4.2rem);
            font-weight: 800;
            line-height: 1;
        }

        .status-card p {
            color: #43514c;
            font-size: 1.05rem;
            line-height: 1.65;
        }

        .status-footer {
            padding: 1.5rem 0;
            color: #66736e;
            font-size: .95rem;
        }

        @media (max-width: 560px) {
            .status-nav {
                align-items: flex-start;
                flex-direction: column;
                padding: 1rem 0;
            }

            .actions {
                flex-direction: column;
                width: 100%;
            }
        }
    </style>
</head>
<body>
<!-- Optional JavaScript -->
<!-- jQuery first, then Popper.js, then Bootstrap JS -->
<script src="https://code.jquery.com/jquery-3.2.1.slim.min.js"
        integrity="sha384-KJ3o2DKtIkvYIK3UENzmM7KCkRr/rE9/Qpg6aAZGJwFDMVNA/GpGFF93hXpG5KkN"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/popper.js@1.12.9/dist/umd/popper.min.js"
        integrity="sha384-ApNbgh9B+Y1QKtv3Rn7W3mgPxhU9K/ScQsAP7hUibX39j7fakFPskvXusvfa0b4Q"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@4.0.0/dist/js/bootstrap.min.js"
        integrity="sha384-JZR6Spejh4U02d8jOt6vLEHfe/JQGiRRSQQxSfFWpi1MquVdAyjUar5+76PVCmYl"
        crossorigin="anonymous"></script>

<div class="status-shell container">
    <nav class="status-nav" aria-label="Main navigation">
        <a class="brand" th:href="@{/}">OpenIssuer Admin</a>
        <div class="actions">
            <a class="secondary-action" th:href="@{/}">Home</a>
            <a class="secondary-action" th:href="${@tenantAuthorizationUrlResolver.currentIssuerUri()} + '/signup'">Signup</a>
            <a class="primary-action" th:href="@{/admin/dashboard}">Login</a>
        </div>
    </nav>

    <main class="status-card">
        <p class="eyebrow">Login error</p>
        <h1>OAuth login could not be completed.</h1>
        <p>
            The admin login session may be stale, or the account may no longer be
            available. Return home or start a fresh login attempt.
        </p>
        <div class="actions mt-4">
            <a class="primary-action" th:href="@{/admin/dashboard}">Try login again</a>
            <a class="secondary-action" th:href="@{/}">Return home</a>
        </div>
    </main>

    <footer class="status-footer">OpenIssuer authorization manager web application 2026</footer>

</div>


</body>
</html>
