<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Oauth Clients</title>
    <script>
        function sendDelete(url) {
            if(!confirm("Do you really want to delete this Organization?")) {
                console.log("cancel delete");
                return false;
            }
            var xhttp = new XMLHttpRequest();
            xhttp.open("DELETE", url, true);
            xhttp.onload = function () {
                let responseURL = xhttp.responseURL;
                console.log("Redirecting to:", responseURL);
                window.location.replace("/admin/organizations");
            };
            xhttp.send();
        }
    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>
    <div class="row p-3">
        <div class="col-2 admin-sidebar" th:with="activeLink=Organizations" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm p-2 pe-4 m-1">
            <div class="mb-3">
                <div th:if="${message}">
                    <div class="toast fade show"  role="alert" aria-live="assertive" aria-atomic="true">
                        <div class="toast-header">
                            <svg aria-hidden="true" class="bd-placeholder-img rounded me-2" height="20" preserveAspectRatio="xMidYMid slice" width="20" xmlns="http://www.w3.org/2000/svg"><rect width="100%" height="100%" fill="#007aff"></rect></svg>
                            <strong class="me-auto">Bootstrap</strong>
                            <button type="button" class="btn-close" data-bs-dismiss="toast" aria-label="Close"></button>
                        </div>
                        <div class="toast-body">
                            <span th:text="${message}"></span>
                        </div>
                    </div>
                </div>
            </div>
            <div>
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" th:href="@{/admin/organizations/{id}(id=${organization.id})}">Organization</a>
                    </li>
                    <li class="nav-item" th:if="${organization.id}">
                        <a class="nav-link" th:href="@{/admin/organizations/{organizationId}/roles(organizationId=${organization.id})}" th:text="${organization.name}+' Roles'">View Roles</a>
                    </li>
                    <li class="nav-item" th:if="${organization.id}">
                        <a class="nav-link" th:href="@{/admin/organizations/{organizationId}/users(organizationId=${organization.id})}">User association</a>
                    </li>

                </ul>
            </div>

            <form class="mt-3" th:if="${organization}" action="#" th:action="@{/admin/organizations}" th:object="${organization}" method="post">
                <input type="hidden"  th:field="*{id}"/>
                <div class="mb-3">
                    <label for="name" class="form-label">Organization name</label>
                    <p th:if="${#fields.hasErrors('name')}" class="text-danger">Please enter organization name</p>
                    <input type="text" class="form-control" id="name" th:field="*{name}" placeholder="organization name" />

                    <div class="form-check">
                        <input class="form-check-input" type="checkbox" value="" id="flexCheckDefault" th:field="*{defaultOrganization}" th:disabled="*{defaultOrganization != null and defaultOrganization}">
                        <input type="hidden" th:field="*{previousDefaultOrganization}"/>

                        <label class="form-check-label" for="flexCheckDefault" th:if="*{defaultOrganization == false}">
                           Make this your default organization (will replace any existing default preference)
                        </label>
                        <label class="form-check-label" for="flexCheckDefault" th:if="*{defaultOrganization}">
                            Default organization (will replace any existing default preference) (can't change)
                        </label>
                    </div>
                </div>

                <div class="mb-3">
                    <button type="submit" class="btn btn-primary mb-3">Submit</button>
                    <button type="reset" class="btn btn-secondary mb-3">Reset</button>
                </div>
            </form>
        </div>

    </div>
   <div class="admin-footer">
       <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
