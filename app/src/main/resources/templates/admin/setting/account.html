<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Settings page</title>
    <script th:inline="javascript">

        function makeAdmin(url, page, size) {
            console.log("url: " + url);
            var xhttp = new XMLHttpRequest();
            xhttp.open("POST", url, true);
            xhttp.onload = function () {
            let responseUrl = xhttp.responseURL;

            let url = '/admin/settings?page='+'&page=' + page+'&size='+size;

            console.log("redirecting to url: " + url);
            window.location.replace(url);
          };
            xhttp.send();
        }

       function removeUserAsOrgAdmin(url,  page, size) {
           if(!confirm("Do you really want to remove this user as OrgAdmin role?")) {
              console.log("cancel delete");
              return false;
           }

            console.log("url: " + url);
            var xhttp = new XMLHttpRequest();
            xhttp.open("DELETE", url, true);
            xhttp.onload = function () {
            let responseUrl = xhttp.responseURL;

            console.log('remove user as orgadmin api completed')
            let url = '/admin/settings?page='+'&page=' + page+'&size='+size;
            console.log("redirecting to url: " + url);
            window.location.replace(url);
          };
            xhttp.send();
        }

    </script>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>

    <div class="row p-3">
        <div class="col-2" th:with="activeLink=Settings" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm">
            <div>
                <ul class="nav nav-tabs">
                    <li class="nav-item">
                        <a class="nav-link active" aria-current="page" href="#">OrgAdmin roles</a>
                    </li>
                </ul>
            </div>
            <div class="alert alert-primary m-3" role="alert" th:if="${error}">
                <span th:text="${error}"></span>
            </div>
            <div class="col-sm mt-3" th:if="${error == null}">
                <div class="col-sm-5">
                    <label for="basic-addon1">Find user with their username</label>
                    <form class="mt-3 form-inline"
                          th:action="@{/admin/settings/{organizationId}/users(organizationId=${organization.id})}"
                          th:object="${organization}" method="post">
                        <div class="input-group mb-3">
                            <div class="input-group-prepend">
                                <span class="input-group-text" id="basic-addon1">@</span>
                            </div>
                            <input type="text" name="username" class="form-control" placeholder="Username"
                                   aria-label="Username" aria-describedby="basic-addon1">
                        </div>
                        <button type="submit" class="btn btn-primary mb-2">Search by username</button>
                    </form>
                </div>

                <div>

                    <p class="h5 m-4" th:if="${message}" th:text="${message}"></p>


                    <div class="col mt-5" th:if="${page}">
                        <p>Users in this organization</p>
                        <ul class="pagination" th:if="${page}" th:with="pageSize=${param.size}">
                            <li  class="page-item" th:classappend="${page.number <= 0} ? 'disabled'">
                                <a class="page-link" th:href="@{?(page=${page.number-1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}" tabindex="-1">Previous</a>
                            </li>

                            <li class="page-item" th:classappend="${page.totalPages <= (page.number+1)} ? 'disabled'">
                                <a class="page-link" th:href="@{?(page=${page.number+1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}">Next Page</a>
                            </li>
                        </ul>
                    </div>
                    <div class="dropdown" th:if="${page}">
                        <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Page size
                        </button>
                        <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='2'))}">2</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='5'))}">5</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='40'))}">40</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='50'))}">50</a>
                        </div>
                    </div>

                    <div class="col mt-4">
                        <table class="table" th:if="${users}">
                            <thead>
                            <tr>
                                <th scope="col">First</th>
                                <th scope="col">Last</th>
                                <th scope="col">Email</th>
                                <th scope="col">Handle</th>
                                <th scope="col">Superadmin</th>
                            </tr>
                            </thead>
                            <tbody>

                            <tr th:if="${page}" th:each="user : ${users}">
                                <td><span th:text="${user.firstName}"></span></td>
                                <td><span th:text="${user.lastName}"></span></td>
                                <td><span th:text="${user.email}"></span></td>
                                <td><span th:text="${user.authenticationId}"></span></td>
                                <td>
                                    <div th:if="${user.authzManagerRoleAssignmentId == null}">
                                        <form action="#" method="post" th:action="@{/admin/settings?page={pageNumber}&size={pageSize}&authzManagerRoleId={authzManagerRoleId}&userId={userId}&organizationId={organizationId}
                                            (pageNumber=${page.number},pageSize=${page.size},authzManagerRoleId=${authzManagerRoleId},userId=${user.id},organizationId=${organizationId})}">

                                            <button type="submit" class="btn btn-primary btn-secondary">Make OrgAdmin </button>
                                        </form>
                                    </div>
                                   <div th:if="${user.authzManagerRoleAssignmentId}">
                                       <button th:if="${user.enabled}" type="button" th:with="page=${page.number}, size=20, url=@{/admin/settings?authzManagerRoleAssignmentId={authzManagerRoleAssignmentId}
                                         (authzManagerRoleAssignmentId=${user.authzManagerRoleAssignmentId})}"
                                                 th:onclick="removeUserAsOrgAdmin([[${url}]], [[${page}]], [[${size}]])"
                                                 class="btn btn-primary">Remove OrgAdmin </button>
                                       <button th:if="${user.enabled == false}" type="submit" class="btn btn-secondary">OrgAdmin</button>

                                    </div>
                                </td>

                            </tr>
                            </tbody>
                        </table>
                    </div>
                </div>
            </div>
        </div>


    </div>
    <div class="p-4 m-4 bg-secondary-subtle rounded-2">
        <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
<script th:inline="javascript">
    const myForm = document.getElementById('myForm');
    const submitButton = document.getElementById('submit');
    console.log('myform and submit button referenced')

    if (myForm != null) { //myForm can be null if the signup was success we don't show the form from the div tag
        myForm.addEventListener('submit', function() {
            console.log('disable submit button after submit button clicked')
            submitButton.disabled = true;
            // Optionally, change the button text to indicate submission
            submitButton.textContent = 'Submitting...';
          }
        );
    }

    function copyValue() {
           var sourceField = document.getElementById("email");
           var targetField = document.getElementById("authenticationId");
           targetField.value = sourceField.value;
       }

       function togglePassword() {
           var toggle = document.getElementById('password');

           if(toggle.type === "password"){
               toggle.type = "text";
           }else{
               toggle.type = "password";
           }
       }

       function enablePassword() {
           var checkbox = document.getElementById('setPassword');
           const passwordDiv = document.getElementById('passwordDiv');

           if(checkbox.checked){
               passwordDiv.classList.remove("d-none");
               passwordDiv.style.display = "block"
           }
           else{
               passwordDiv.style.display = "none";
           }
       }
</script>
</body>
</html>
