<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Settings page</title>

    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>

    <div class="row p-3">
        <div class="col-2" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm">
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link active" aria-current="page" href="#">Manage</a>
                </li>
            </ul>


        </div>


    </div>
    <div class="p-4 m-4 bg-secondary-subtle rounded-2">
        <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
<script th:inline="javascript">
    const myForm = document.getElementById('myForm');
    const submitButton = document.getElementById('submit');
    console.log('myform and submit button referenced')

    if (myForm != null) { //myForm can be null if the signup was success we don't show the form from the div tag
        myForm.addEventListener('submit', function() {
            console.log('disable submit button after submit button clicked')
            submitButton.disabled = true;
            // Optionally, change the button text to indicate submission
            submitButton.textContent = 'Submitting...';
          }
        );
    }

    function copyValue() {
           var sourceField = document.getElementById("email");
           var targetField = document.getElementById("authenticationId");
           targetField.value = sourceField.value;
       }

       function togglePassword() {
           var toggle = document.getElementById('password');

           if(toggle.type === "password"){
               toggle.type = "text";
           }else{
               toggle.type = "password";
           }
       }

       function enablePassword() {
           var checkbox = document.getElementById('setPassword');
           const passwordDiv = document.getElementById('passwordDiv');

           if(checkbox.checked){
               passwordDiv.classList.remove("d-none");
               passwordDiv.style.display = "block"
           }
           else{
               passwordDiv.style.display = "none";
           }
       }
</script>
</body>
</html>
