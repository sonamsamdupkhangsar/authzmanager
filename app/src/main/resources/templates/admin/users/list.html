<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <!-- Required meta tags -->
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Oauth Clients</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet" integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>

<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>
    <div class="row p-3">
        <div class="col-2" th:with="activeLink='Add User'" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm">
            <ul class="nav nav-tabs">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/organizations/users}">Add User</a>
                </li>
            </ul>

            <div class="col p-1 m-1">
                <div class="alert alert-danger" th:if="${error != null && #strings.contains(error, 'You need to set a default organization to add user.')}">
                    You need to set a default organization to add user. Go here to create an <a th:href="@{/admin/organizations}">Organizations</a> and set to default.
                </div>
                <div class="alert alert-danger" th:if="${error != null && not #strings.contains(error, 'You need to set a default organization to add user.')}">
                    <span th:text="${error}"></span>
                </div>

                <div class="col" th:if="${page}">
                    <p>Users assigned to your default organization
                        <a th:href="@{/admin/organizations/{id}(id=${organization.id})}" class="badge rounded-pill bg-primary" th:text="${organization.name}"></a>
                    </p>
                    <ul class="pagination" th:if="${page}" th:with="pageSize=${param.size}">
                        <li  class="page-item" th:classappend="${page.number <= 0} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number-1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}" tabindex="-1">Previous</a>
                        </li>

                        <li class="page-item" th:classappend="${page.totalPages <= (page.number+1)} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number+1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}">Next Page</a>
                        </li>
                    </ul>
                </div>
                <div class="dropdown" th:if="${page}">
                    <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                        Page size
                    </button>
                    <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                        <a class="dropdown-item" th:href="@{?(page=${page.number},(size='5'))}">5</a>
                        <a class="dropdown-item" th:href="@{?(page=${page.number},(size='10'))}">10</a>
                        <a class="dropdown-item" th:href="@{?(page=${page.number},(size='20'))}">20</a>
                        <a class="dropdown-item" th:href="@{?(page=${page.number},(size='50'))}">50</a>
                    </div>
                </div>

                <div class="col mt-4">
                    <table class="table table-hover" th:if="${users}">
                        <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">First</th>
                            <th scope="col">Last</th>
                            <th scope="col">Email</th>
                            <th scope="col">Handle</th>
                            <th scope="col">Remove</th>
                        </tr>
                        </thead>
                        <tbody>

                        <tr th:each="user, rowStat : ${users}">
                            <td th:text="${rowStat.count}"></td>
                            <td><span th:text="${user.firstName}"></span></td>
                            <td><span th:text="${user.lastName}"></span></td>
                            <td><span th:text="${user.email}"></span></td>
                            <td><span th:text="${user.authenticationId}"></span></td>
                            <td><button type="button" th:with="organizationId=${organization.id}, myPage=${page.number}, pageSize=${param.size}, url=@{/admin/organizations/{organizationId}/users/{userId}/authenticationId/{authenticationId}(organizationId=${organization.id}, userId=${user.id}, authenticationId=${user.authenticationId})}" th:onclick="sendDelete([[${url}]], [[${organizationId}]], [[${myPage}]], [[${pageSize}]])"
                                        class="btn btn-primary">Remove user</button></td>
                        </tr>
                        </tbody>
                    </table>
                </div>
            </div>
        </div>
    </div>

    <div class="p-4 m-4 bg-secondary-subtle rounded-2">
        <div th:insert="~{footer :: copyright}"></div>
    </div>

</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js" integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r" crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js" integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy" crossorigin="anonymous"></script>
</body>
</html>
