<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Subdomain Organizations</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>
    <div class="row p-3">
        <div class="col-2 admin-sidebar" th:with="activeLink=Subdomain" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm admin-main-panel">
            <h1>Subdomain</h1>

            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/subdomain/organizations}">Organizations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/subdomain/users}">Users</a>
                </li>
            </ul>

            <div class="alert alert-danger mt-3" th:if="${error}">
                <span th:text="${error}"></span>
            </div>

            <div class="mt-4" th:if="${error == null}">
                <p class="text-muted" th:if="${subdomain}" th:text="${subdomain.host}"></p>

                <div th:if="${page != null}">
                    <ul class="pagination" th:if="${page}" th:with="pageSize=${param.size}">
                        <li class="page-item" th:classappend="${page.number <= 0} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number-1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}" tabindex="-1">Previous</a>
                        </li>
                        <li class="page-item" th:classappend="${page.totalPages <= (page.number+1)} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number+1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}">Next Page</a>
                        </li>
                    </ul>

                    <div class="dropdown mb-3">
                        <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="dropdownMenuButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                            Page size
                        </button>
                        <div class="dropdown-menu" aria-labelledby="dropdownMenuButton">
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='2'))}">2</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='5'))}">5</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='20'))}">20</a>
                            <a class="dropdown-item" th:href="@{?(page=${page.number},(size='50'))}">50</a>
                        </div>
                    </div>
                </div>

                <table class="table table-hover" th:if="${page != null}">
                    <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">Organization</th>
                        <th scope="col">Id</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="organization, rowStat : ${page.content}">
                        <td th:text="${rowStat.count}"></td>
                        <td>
                            <a th:text="${organization.name}"
                               th:href="@{/admin/organizations/{id}(id=${organization.id})}"></a>
                        </td>
                        <td><span th:text="${organization.id}"></span></td>
                    </tr>
                    </tbody>
                </table>

                <p th:if="${page != null and page.content.isEmpty()}">No organizations found.</p>
            </div>
        </div>
    </div>
    <div class="admin-footer">
        <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
</body>
</html>
