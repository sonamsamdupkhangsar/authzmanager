<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Subdomain Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>
    <div class="row p-3">
        <div class="col-2" th:with="activeLink=Subdomain" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm">
            <h1>Subdomain</h1>

            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/subdomain/organizations}">Organizations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/subdomain/users}">Users</a>
                </li>
            </ul>

            <div class="alert alert-danger mt-3" th:if="${error}">
                <span th:text="${error}"></span>
            </div>

            <div class="mt-4" th:if="${error == null}">
                <p class="text-muted" th:if="${subdomain}" th:text="${subdomain.host}"></p>

                <div th:if="${page != null}">
                    <ul class="pagination" th:if="${page}" th:with="pageSize=${param.size}">
                        <li class="page-item" th:classappend="${page.number <= 0} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number-1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__,userPage=${userPage},userSize=${userSize})}" tabindex="-1">Previous Organizations</a>
                        </li>
                        <li class="page-item" th:classappend="${page.totalPages <= (page.number+1)} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number+1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__,userPage=${userPage},userSize=${userSize})}">Next Organizations</a>
                        </li>
                    </ul>

                    <div class="d-flex gap-2 mb-3">
                        <div class="dropdown">
                            <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="organizationPageSizeButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                Organization page size
                            </button>
                            <div class="dropdown-menu" aria-labelledby="organizationPageSizeButton">
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='2',userPage=${userPage},userSize=${userSize})}">2</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='5',userPage=${userPage},userSize=${userSize})}">5</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='20',userPage=${userPage},userSize=${userSize})}">20</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='50',userPage=${userPage},userSize=${userSize})}">50</a>
                            </div>
                        </div>

                        <div class="dropdown">
                            <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="userPageSizeButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                User page size
                            </button>
                            <div class="dropdown-menu" aria-labelledby="userPageSizeButton">
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size=${page.size},userPage=${userPage},userSize='2')}">2</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size=${page.size},userPage=${userPage},userSize='5')}">5</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size=${page.size},userPage=${userPage},userSize='20')}">20</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size=${page.size},userPage=${userPage},userSize='50')}">50</a>
                            </div>
                        </div>
                    </div>
                </div>

                <div th:each="organizationUsersRow : ${organizationUsers}" class="mb-5">
                    <h2 class="h5">
                        <a th:text="${organizationUsersRow.organization.name}"
                           th:href="@{/admin/organizations/{id}(id=${organizationUsersRow.organization.id})}"></a>
                    </h2>

                    <ul class="pagination pagination-sm" th:if="${organizationUsersRow.userIdPage}">
                        <li class="page-item" th:classappend="${organizationUsersRow.userIdPage.number <= 0} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number},size=${page.size},userPage=${organizationUsersRow.userIdPage.number-1},userSize=${organizationUsersRow.userIdPage.size})}" tabindex="-1">Previous Users</a>
                        </li>
                        <li class="page-item" th:classappend="${organizationUsersRow.userIdPage.totalPages <= (organizationUsersRow.userIdPage.number+1)} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number},size=${page.size},userPage=${organizationUsersRow.userIdPage.number+1},userSize=${organizationUsersRow.userIdPage.size})}">Next Users</a>
                        </li>
                    </ul>

                    <table class="table table-hover" th:if="${organizationUsersRow.users}">
                        <thead>
                        <tr>
                            <th scope="col">#</th>
                            <th scope="col">First</th>
                            <th scope="col">Last</th>
                            <th scope="col">Email</th>
                            <th scope="col">Handle</th>
                        </tr>
                        </thead>
                        <tbody>
                        <tr th:each="user, rowStat : ${organizationUsersRow.users}">
                            <td th:text="${rowStat.count}"></td>
                            <td><span th:text="${user.firstName}"></span></td>
                            <td><span th:text="${user.lastName}"></span></td>
                            <td><span th:text="${user.email}"></span></td>
                            <td><span th:text="${user.authenticationId}"></span></td>
                        </tr>
                        </tbody>
                    </table>

                    <p th:if="${organizationUsersRow.users == null or organizationUsersRow.users.isEmpty()}">No users found.</p>
                </div>

                <p th:if="${organizationUsers != null and organizationUsers.isEmpty()}">No organizations found.</p>
            </div>
        </div>
    </div>
    <div class="p-4 m-4 bg-secondary-subtle rounded-2">
        <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
</body>
</html>
