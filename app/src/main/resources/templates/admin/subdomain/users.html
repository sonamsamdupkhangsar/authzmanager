<!doctype html>
<html lang="en" xmlns:th="http://www.w3.org/1999/xhtml">
<head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1, shrink-to-fit=no">
    <title>Subdomain Users</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet"
          integrity="sha384-QWTKZyjpPEjISv5WaRU9OFeRpok6YctnYmDr5pNlyT2bRjXh0JMhjY6hW+ALEwIH" crossorigin="anonymous">
</head>
<body>
<div class="container">
    <div th:insert="~{header :: jumbotron}"></div>
    <div class="row p-3">
        <div class="col-2 admin-sidebar" th:with="activeLink=Subdomain" th:insert="~{leftnav :: menu}"></div>
        <div class="col-sm admin-main-panel">
            <h1>Subdomain</h1>

            <ul class="nav nav-tabs mt-3">
                <li class="nav-item">
                    <a class="nav-link" th:href="@{/admin/subdomain/organizations}">Organizations</a>
                </li>
                <li class="nav-item">
                    <a class="nav-link active" th:href="@{/admin/subdomain/users}">Users</a>
                </li>
            </ul>

            <div class="alert alert-danger mt-3" th:if="${error}">
                <span th:text="${error}"></span>
            </div>

            <div class="mt-4" th:if="${error == null}">
                <p class="text-muted" th:if="${subdomain}" th:text="${subdomain.host}"></p>

                <div th:if="${page != null}">
                    <ul class="pagination" th:if="${page}" th:with="pageSize=${param.size}">
                        <li class="page-item" th:classappend="${page.number <= 0} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number-1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}" tabindex="-1">Previous</a>
                        </li>
                        <li class="page-item" th:classappend="${page.totalPages <= (page.number+1)} ? 'disabled'">
                            <a class="page-link" th:href="@{?(page=${page.number+1},__(${#strings.isEmpty(pageSize)} ? '' : ('size=' + ${pageSize}))__)}">Next</a>
                        </li>
                    </ul>

                    <div class="d-flex gap-2 mb-3 align-items-center">
                        <div class="dropdown">
                            <button class="btn btn-info btn-sm dropdown-toggle" type="button" id="pageSizeButton" data-bs-toggle="dropdown" aria-haspopup="true" aria-expanded="false">
                                Page size
                            </button>
                            <div class="dropdown-menu" aria-labelledby="pageSizeButton">
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='2')}">2</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='5')}">5</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='20')}">20</a>
                                <a class="dropdown-item" th:href="@{?(page=${page.number},size='50')}">50</a>
                            </div>
                        </div>

                        <span class="text-muted small"
                              th:text="${page.totalElements + ' user organization memberships'}"></span>
                    </div>
                </div>

                <table class="table table-hover align-middle" th:if="${userRows != null and !userRows.isEmpty()}">
                    <thead>
                    <tr>
                        <th scope="col">#</th>
                        <th scope="col">First</th>
                        <th scope="col">Last</th>
                        <th scope="col">Email</th>
                        <th scope="col">Handle</th>
                        <th scope="col">Organization</th>
                    </tr>
                    </thead>
                    <tbody>
                    <tr th:each="row, rowStat : ${userRows}">
                        <td th:text="${(page.number * page.size) + rowStat.count}"></td>
                        <td><span th:text="${row.user != null ? row.user.firstName : ''}"></span></td>
                        <td><span th:text="${row.user != null ? row.user.lastName : ''}"></span></td>
                        <td><span th:text="${row.user != null ? row.user.email : ''}"></span></td>
                        <td><span th:text="${row.user != null ? row.user.authenticationId : row.membership.userId}"></span></td>
                        <td>
                            <a th:text="${row.membership.organizationName}"
                               th:href="@{/admin/organizations/{id}(id=${row.membership.organizationId})}"></a>
                        </td>
                    </tr>
                    </tbody>
                </table>

                <p th:if="${userRows != null and userRows.isEmpty()}">No users found.</p>
            </div>
        </div>
    </div>
    <div class="admin-footer">
        <div th:insert="~{footer :: copyright}"></div>
    </div>
</div>
<script src="https://cdn.jsdelivr.net/npm/@popperjs/core@2.11.8/dist/umd/popper.min.js"
        integrity="sha384-I7E8VVD/ismYTF4hNIPjVp/Zjvgyol6VFvRkX/vR+Vc4jQkC+hVqc2pM8ODewa9r"
        crossorigin="anonymous"></script>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.min.js"
        integrity="sha384-0pUGZvbkm6XF6gxjEnlmuGrJXVbNuzT9qBBavbLwCsOGabYfZo0T0to5eqruptLy"
        crossorigin="anonymous"></script>
</body>
</html>
