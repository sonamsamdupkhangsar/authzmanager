# Test configuration for tenant-aware authzmanager behavior.
logging:
  level:
    root: info
    me.sonam: info
info:
  app:
    name: Springboot me.sonam.account.Application
    description: This is a Springboot application
    version: 1.0.0

management:
  endpoint:
    health:
      show-details: always

server:
    port: 8080

spring:
  profiles:
    active: localdevtest
  r2dbc:
    url: r2dbc:h2:mem:///contentitem?options=DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    name: sa
    password:
  security:
    oauth2:
      resourceserver:
        jwt:
          issuer-uri: http://localhost:9001

POSTGRES_USERNAME: dusername
POSTGRES_DBNAME: dbname
POSTGRES_SERVICE: dservice
POSTGRES_PASSWORD: dpassword

# this is used for getting accesstoken by header filter in jwt-validator (ReactiveRequestContextHolder.class)
auth-server:
  root: http://localhost:9001
  contextPath: /issuer
  clients: /clients
  clientOrganizations: /clients
  authenticate: /authenticate
  oauth2token:
    path: /oauth2/token
    grantType: client_credentials

issuerUri: http://openissuer.test:9001

authzmanager:
  oauth2:
    registration-id: b4dfe3fb-1692-44b8-92ab-366ccc84b539-authzmanager
    client-id: b4dfe3fb-1692-44b8-92ab-366ccc84b539-authzmanager
    client-secret: hello
  tenancy:
    host-prefix: authzmanager

user-rest-service:
  root: http://localhost:{port}
  context: /users
  photo: /photo

authentication-rest-service:
  root: http://localhost:{port}/authentications
  authenticate: /authenticate

organization-rest-service:
  root: http://localhost:{port}
  contextPath: /organizations

role-rest-service:
  root: http://localhost:{port}
  contextPath: /roles

account-rest-service:
  root: http://localhost:{port}
  context: /accounts
  accountDelete: /accounts/delete

setting-rest-service:
  root: http://localhost:{port}
  context: ${setting-rest-service.root}/settings
  defaultOrganizationId: ${setting-rest-service.context}/users/{userId}

endpoint:
  user:
    signup: "/public/user/signup"
    update: "/user"
    getbyauthId: "/user/{authid}"
    matchingnames: "/user/names/{firstname}/{lastname}"
    profilephoto: "/user/profilephoto"

EUREKA_USER: test
EUREKA_PASSWORD: test

eureka:
  client:
    enabled: false
    serviceUrl:
      defaultZone: https://${EUREKA_USER}:${EUREKA_PASSWORD}@discovery-service.sonam.cloud/eureka

BASE64_CLIENT_ID_SECRET: b2F1dGgtY2xpZW50Om9hdXRoLXNlY3JldA==
REQUEST_SCOPES: bWVzc2FnZS5yZWFkIG1lc3NhZ2Uud3JpdGUK

requestFilters:
  - out:
    outHttpMethods:
    accessToken:
      option: request
      scopes: ${REQUEST_SCOPES}
      base64EncodedClientIdSecret: ${BASE64_CLIENT_ID_SECRET}

allowedOrigins: http://api-gateway, 10.0.0.28, localhost, 127.0.0.1, api-gateway, 10.0.0.28:8080, 127.0.0.1

aws:
  s3:
    region: nycregion
    accessKeyId: my_key
    secretAccessKey: my_secretkey
    bucket: mybucket
    endpoint: https://sonam.cloud/endpoint
    subdomain: https://www.sonam.cloud
    videoPath: videos/
    photoPath: photos/
    filePath: files/
    imageAclHeader: x-amz-acl
    imageAclValue: public-read
    presignDurationInMinutes: 60
    thumbnailSize:
      width: 100
      height: 100
tokenExpireSeconds: 3


maxClients: 5
maxOrganizations: 1
maxUserPerOrganization: 5
maxRoles: 5
